server:
  port: 5021

spring:
  web:
    resources:
      static-locations: "file:./frontend/"
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

app:
  volcengine:
    api-key: "${VOLCENGINE_API_KEY:}"
    base-url: "https://ark.cn-beijing.volces.com/api/v3"
    model: "doubao-seedance-2-0-260128"

  auth:
    password: "${APP_PASSWORD:123456}"

  paths:
    user-data-dir: "./"
    temp-output-dir: "./.temp-output"

  kuaimai:
    app-key: "${KUAIMAI_APP_KEY:1702335751}"
    app-secret: "${KUAIMAI_APP_SECRET:99b191f9f05c470591f893ecf24c3664}"
    access-token: "${KUAIMAI_ACCESS_TOKEN:34e697530dd04dd7b548f5941a964bd6}"
    refresh-token: "${KUAIMAI_REFRESH_TOKEN:8fb8a62836db47dcab67d391bb9f17aa}"

  gpt-image:
    provider: "${IMG_PROVIDER:gemini}"
    # Gemini → https://generativelanguage.googleapis.com, model: gemini-3-pro-image
    # gpt-image-1 → https://api.linapi.net, model: gpt-image-1
    base-url: "${IMG_BASE_URL:https://generativelanguage.googleapis.com}"
    model: "${IMG_MODEL:gemini-3-pro-image}"
    keys: "${IMG_KEYS:}"
    api-keys:
      - "${GPT_IMAGE_KEY_1:}"
      - "${GPT_IMAGE_KEY_2:}"
      - "${GPT_IMAGE_KEY_3:}"
      - "${GPT_IMAGE_KEY_4:}"
    # Gemini 生图质量参数（仅 gemini 路径生效，需用 proto 枚举名）
    aspect-ratio: "${IMG_ASPECT_RATIO:ASPECT_RATIO_ONE_BY_ONE}"
    image-size: "${IMG_SIZE:IMAGE_SIZE_ONE_K}"
    proxy-host: "${IMG_PROXY_HOST:}"
    proxy-port: "${IMG_PROXY_PORT:0}"
  # 标题/款式名生成（与生图解耦）：默认阿里云百炼 DashScope（OpenAI 兼容），qwen-vl-plus
  text:
    base-url: "${TEXT_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}"
    model: "${TEXT_MODEL:qwen-vl-plus}"
    api-key: "${TEXT_API_KEY:}"

logging:
  level:
    com.lyauto: INFO
